schema:
    - http://localhost:4000/
    - src/graphql/schema/client-schema.graphql
documents: 'src/graphql/**/*.graphql'

generates:
    src/graphql/generated/:
        preset: client
        presetConfig:
            fragmentMasking: false
        config:
            scalars:
                Date: string
            skipTypeNameForRoot: true
            nonOptionalTypename: true
